<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <!-- House / building icon -->
  <g transform="translate(0, 4)">
    <!-- Roof triangle -->
    <polygon points="24,0 48,16 0,16" fill="#1e1e1e"/>
    <!-- Roof highlight line (gold ridge) -->
    <line x1="24" y1="0" x2="24" y2="16" stroke="#c9a14a" stroke-width="1.5"/>
    <!-- Main body -->
    <rect x="4" y="16" width="40" height="26" fill="#1e1e1e"/>
    <!-- Door (centered, arched top) -->
    <rect x="18" y="25" width="12" height="17" rx="6" fill="#c9a14a"/>
    <rect x="18" y="31" width="12" height="11" fill="#c9a14a"/>
    <!-- Left window -->
    <rect x="6"  y="19" width="8" height="8" rx="1" fill="#c9a14a" opacity="0.85"/>
    <line x1="10" y1="19" x2="10" y2="27" stroke="#1e1e1e" stroke-width="0.8"/>
    <line x1="6"  y1="23" x2="14" y2="23" stroke="#1e1e1e" stroke-width="0.8"/>
    <!-- Right window -->
    <rect x="34" y="19" width="8" height="8" rx="1" fill="#c9a14a" opacity="0.85"/>
    <line x1="38" y1="19" x2="38" y2="27" stroke="#1e1e1e" stroke-width="0.8"/>
    <line x1="34" y1="23" x2="42" y2="23" stroke="#1e1e1e" stroke-width="0.8"/>
    <!-- Base line / ground -->
    <rect x="0" y="42" width="48" height="2.5" rx="1.25" fill="#c9a14a"/>
  </g>

  <!-- Vertical separator -->
  <rect x="60" y="6" width="1.5" height="44" rx="0.75" fill="#e0e0e0"/>

  <!-- Wordmark -->
  <!-- "DESIGN" -->
  <text
    x="70" y="28"
    font-family="Montserrat, sans-serif"
    font-weight="800"
    font-size="18"
    letter-spacing="3"
    fill="#1e1e1e"
  >DESIGN</text>
  <!-- Gold underline accent -->
  <rect x="70" y="31" width="122" height="2" rx="1" fill="#c9a14a"/>
  <!-- "HOUSE" -->
  <text
    x="70" y="46"
    font-family="Montserrat, sans-serif"
    font-weight="400"
    font-size="13"
    letter-spacing="8"
    fill="#c9a14a"
  >HOUSE</text>
</svg>
